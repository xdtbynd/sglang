name: Single Test (NPU) - EPD & Speculative
# test round: EPD dynamic register + Speculative decoding (DFLASH, Adaptive, skip-dp-mlp-sync)
#   - test_npu_dflash_speculative.py     (DFLASH: block-size + GSM8K)
#   - test_npu_adaptive_speculative.py   (Adaptive: upshift/downshift + GSM8K, ported from GPU)
#   - test_npu_skip_dp_mlp_sync.py       (skip-dp-mlp-sync: positive EAGLE + negative EAGLE3 Assert)
#   - test_npu_epd_dynamic_register.py   (EPD: --encoder-bootstrap-port + --encoder-register-urls)
# trigger: 2026-07-06 retry after network issue in run 28835466949
# trigger: 2026-07-07 retry after checkout 504 in run 28836809306
# trigger: 2026-07-07 rollback image to cann9.0.0-a3-B090 (run 28837751687 had cache_v view bug + aicore 507015)
# trigger: 2026-07-07 isolate failing cases: skip_dp_mlp_sync (add back --enable-dp-lm-head) + dflash only
on:
  pull_request:
    branches:
      - testcases
    paths:
      - ".github/workflows/single-test-npu-epd-spec.yml"
concurrency:
  group: single-test-npu-epd-spec-${{ github.ref }}
  cancel-in-progress: true
jobs:
  single-node-poc:
    name: single-node-poc
    runs-on: linux-aarch64-a3-4
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/dockerhub/lmsysorg/sglang:cann9.0.0-a3-B090
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check npu info
        run: |
          npu-smi info
      - name: Run test
        timeout-minutes: 120
        env:
          SGLANG_USE_MODELSCOPE: true
          HF_ENDPOINT: https://hf-mirror.com
          SGLANG_IS_IN_CI: true
        shell: bash
        run: |
          sglang_source_path=$(pwd)
          echo "Source code path: ${sglang_source_path}"
          ln -sf ${sglang_source_path} /root/sglang

          # tabulate is required by sglang.test.send_one.
          # NPU CI image does not ship it.
          pip install --quiet tabulate

          # Test cases - EPD + Speculative Decoding
          # Order: fast/stable first. DFLASH is moved to last because its
          # GSM8K eval (200 examples, 128 threads) is the longest running.
          # EPD and Adaptive are commented out (already passing) to reduce
          # runtime while debugging skip_dp_mlp_sync and dflash failures.
          test_cases=(
            "test/registered/ascend/basic_function/speculative_inference/test_npu_skip_dp_mlp_sync.py"
            "test/registered/ascend/basic_function/speculative_inference/test_npu_dflash_speculative.py"
            # "test/registered/ascend/basic_function/EPD/test_npu_epd_dynamic_register.py"
            # "test/registered/ascend/basic_function/speculative_inference/test_npu_adaptive_speculative.py"
          )

          for test_case in "${test_cases[@]}"; do
            if [ ! -f "${sglang_source_path}/${test_case}" ]; then
              echo "The testcase does not exit: ${sglang_source_path}/${test_case}"
              exit 1
            fi
          done

          # copy required file from our daily cache
          cp ~/.cache/modelscope/hub/datasets/otavia/ShareGPT_Vicuna_unfiltered/ShareGPT_V3_unfiltered_cleaned_split.json /tmp
          cp ~/.cache/modelscope/hub/datasets/tmp/test.jsonl /tmp

          echo "scaling_governor performance num: \
            $(cat /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor | grep performance | wc -l)"
          echo "swappiness: $(cat /proc/sys/vm/swappiness)"
          echo "numa_balancing: $(cat /proc/sys/kernel/numa_balancing)"
          echo "sched_migration_cost_ns: $(cat /proc/sys/kernel/sched_migration_cost_ns)"

          export SGLANG_TEST_MAX_RETRY=0
          export SGLANG_SET_CPU_AFFINITY=1
          echo "SGLANG_SET_CPU_AFFINITY: $SGLANG_SET_CPU_AFFINITY"

          echo "Use sglang from image"
          sglang_pkg_path=/sgl-workspace/sglang/python
          ascend_test_util_path=${sglang_pkg_path}/sglang/test/ascend
          mkdir -p ${ascend_test_util_path}
          mv ${ascend_test_util_path} ${ascend_test_util_path}_bak
          cp -r ${sglang_source_path}/python/sglang/test/ascend ${ascend_test_util_path}

          # Set environment of cann
          source /usr/local/Ascend/cann/set_env.sh || true
          source /usr/local/Ascend/nnal/atb/set_env.sh || true

          current_date=$(date +%Y%m%d)
          log_path="/root/.cache/tests/logs/log/${current_date}/${HOSTNAME}"
          rm -rf ${log_path}
          mkdir -p ${log_path}
          echo "Log path: ${log_path}"

          # Run all test cases; record failures but do not stop the loop so
          # that every case gets a chance to run and produce logs.
          overall_failed=0
          for test_case in "${test_cases[@]}"; do
            tc_name=$(basename ${test_case} .py)
            echo "Running test case ${test_case}"
            if python -u ${sglang_source_path}/${test_case}; then
              echo "Finished test case ${test_case} (success)"
            else
              echo "::error::Test case ${test_case} FAILED, continuing with the next case."
              overall_failed=1
            fi
          done

          if [ "${overall_failed}" -ne 0 ]; then
            echo "::error::One or more test cases failed. See logs above."
            exit 1
          fi

          plog_path="/root/ascend/log/debug/plog"
          if [ -d "$plog_path" ];then
            echo "Plog files found. Begin to backup them."
            target_plog_path="/root/.cache/tests/logs/plog/${HOSTNAME}"
            echo "Save path: ${target_plog_path}"
            rm -rf ${target_plog_path}
            mkdir -p ${target_plog_path}
            cp ${plog_path}/* ${target_plog_path}
          fi
