name: Retag Docker Image

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Existing image tag (e.g., main-cann8.5.0-a3)"
        required: true
      target_tag:
        description: "New tag to apply (e.g., latest)"
        required: true

jobs:
  retag:
    if: github.repository == 'Ascend/sglang'
    runs-on: ubuntu-22.04
    steps:
      - name: Login to SWR
        uses: docker/login-action@v2
        with:
          registry: swr.cn-southwest-2.myhuaweicloud.com
          username: ${{ secrets.SWR_SOUTH_2_USERNAME }}
          password: ${{ secrets.SWR_SOUTH_2_PASSWORD }}

      - name: Retag image
        run: |
          echo "Retagging swr.cn-southwest-2.myhuaweicloud.com/base_image/dockerhub/lmsysorg/sglang:${{ inputs.source_tag }} -> lmsysorg/sglang:${{ inputs.target_tag }}"
          docker buildx imagetools create \
            -t swr.cn-southwest-2.myhuaweicloud.com/base_image/dockerhub/lmsysorg/sglang:${{ inputs.target_tag }} \
            lmsysorg/sglang:${{ inputs.source_tag }}