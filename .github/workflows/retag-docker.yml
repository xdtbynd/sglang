name: Retag & Copy Docker Image
on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Existing image tag (e.g., main-cann8.5.0-a3)"
        required: true
      target_tag:
        description: "New tag to apply (e.g., latest)"
        required: true
      source_platform:
        description: "Source Platform (pull only, NO login)"
        required: true
        type: choice
        options:
          - swr
          - quay
          - dockerhub
      target_platform:
        description: "Target Platform (push only, NEED login)"
        required: true
        type: choice
        options:
          - swr
          - quay
          - dockerhub

jobs:
  retag:
    if: github.repository == 'Ascend/sglang'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ====================== 仅目标平台需要登录 ======================
      - name: Login to SWR
        if: inputs.target_platform == 'swr'
        uses: docker/login-action@v2
        with:
          registry: swr.cn-southwest-2.myhuaweicloud.com
          username: ${{ secrets.SWR_SOUTH_2_USERNAME }}
          password: ${{ secrets.SWR_SOUTH_2_PASSWORD }}

      - name: Login to Quay.io
        if: inputs.target_platform == 'quay'
        uses: docker/login-action@v2
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_NAME }}
          password: ${{ secrets.QUAY_PWD }}

      - name: Login to DockerHub
        if: inputs.target_platform == 'dockerhub'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ====================== 镜像地址拼接（源=pull，目标=push） ======================
      - name: Copy and retag image across platforms
        run: |
          # 源镜像（仅拉取）
          if [ "${{ inputs.source_platform }}" = "swr" ]; then
            SOURCE_IMAGE="swr.cn-southwest-2.myhuaweicloud.com/base_image/dockerhub/lmsysorg/sglang:${{ inputs.source_tag }}"
          elif [ "${{ inputs.source_platform }}" = "quay" ]; then
            SOURCE_IMAGE="quay.io/ascend/sglang:${{ inputs.source_tag }}"
          elif [ "${{ inputs.source_platform }}" = "dockerhub" ]; then
            SOURCE_IMAGE="lmsysorg/sglang:${{ inputs.source_tag }}"
          fi

          # 目标镜像（推送）
          if [ "${{ inputs.target_platform }}" = "swr" ]; then
            TARGET_IMAGE="swr.cn-southwest-2.myhuaweicloud.com/base_image/dockerhub/lmsysorg/sglang:${{ inputs.target_tag }}"
          elif [ "${{ inputs.target_platform }}" = "quay" ]; then
            TARGET_IMAGE="quay.io/ascend/sglang:${{ inputs.target_tag }}"
          elif [ "${{ inputs.target_platform }}" = "dockerhub" ]; then
            TARGET_IMAGE="lmsysorg/sglang:${{ inputs.target_tag }}"
          fi

          echo "======= Cross Platform Image Copy ======="
          echo "Source (pull): ${{ inputs.source_platform }}"
          echo "Target (push): ${{ inputs.target_platform }}"
          echo "From: $SOURCE_IMAGE"
          echo "To:   $TARGET_IMAGE"
          echo "========================================="

          # 跨平台复制镜像
          docker buildx imagetools create -t $TARGET_IMAGE $SOURCE_IMAGE